<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200"><rect width="900" height="1200" fill="#1a130e"/><rect x="70" y="45" width="760" height="1110" rx="22" fill="#e4d0a3" stroke="#6b4828" stroke-width="8"/><rect x="95" y="70" width="710" height="1060" rx="12" fill="none" stroke="#8e693b" stroke-width="3"/><g fill="#2c2015" text-anchor="middle" font-family="Georgia,serif"><text x="450" y="200" font-size="56" font-weight="700">GRUNDGESETZ</text><text x="450" y="250" font-size="28">über die</text><text x="450" y="315" font-size="42" font-weight="700">allgemeinen Rechte der Staatsbürger</text><text x="450" y="385" font-size="27">21. Dezember 1867</text></g><g fill="#38291b" font-family="Georgia,serif" font-size="24"><text x="145" y="485">I. Alle Staatsbürger sind vor dem Gesetze gleich.</text><text x="145" y="535">II. Jeder Staatsbürger hat das Recht der persönlichen Freiheit.</text><text x="145" y="585">III. Die Freiheit des Glaubens und des Gewissens ist gewährleistet.</text><text x="145" y="635">IV. Die Freiheit des Wortes, der Schrift und des Druckes gilt</text><text x="145" y="675">im Rahmen der gesetzlichen Ordnung.</text></g><g transform="translate(450 850)"><circle r="118" fill="#8b2b22"/><circle r="92" fill="none" stroke="#d9bd7e" stroke-width="5"/><path d="M0-58 18-22 58-18 28 10 38 50 0 30-38 50-28 10-58-18-18-22Z" fill="#d9bd7e"/><text y="95" text-anchor="middle" font-family="Georgia,serif" font-size="19" fill="#d9bd7e">ÖSTERREICH · 1867</text></g><path d="M300 1020c90-35 210-35 300 0" fill="none" stroke="#4e3724" stroke-width="4"/><text x="450" y="1080" text-anchor="middle" font-family="cursive" font-size="46" fill="#3d2a1b">Franz Joseph</text><text x="450" y="1140" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#5a4129">Historische Rekonstruktion · keine archivalische Originalaufnahme</text></svg>